services:
  - type: web
    name: asset-hub-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build -w @home-land/database && npm run build -w @home-land/api && npm run db:migrate:deploy
    startCommand: npm run start -w @home-land/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        value: https://asset-hub-web.onrender.com
      - key: APP_PUBLIC_URL
        value: https://asset-hub-web.onrender.com
      - key: CURRENT_TERMS_VERSION
        value: 2026-06-20
      - key: SESSION_IDLE_TTL_MINUTES
        value: "60"
      - key: SESSION_ABSOLUTE_TTL_HOURS
        value: "24"
      - key: MFA_RECENT_AUTH_MINUTES
        value: "10"
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_REQUIRE_TLS
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: asset-hub-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build -w @home-land/database && npm run build -w @home-land/contracts && npm run build -w @home-land/web
    startCommand: npm run start -w @home-land/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://asset-hub-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
