name: the-home-land

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: homeland
      POSTGRES_USER: homeland
      POSTGRES_PASSWORD: homeland_local
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - homeland_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeland -d homeland"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mailpit:
    image: axllent/mailpit:v1.30.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

volumes:
  homeland_postgres_data:
