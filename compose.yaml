name: the-home-land

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: homeland
      POSTGRES_USER: homeland
      POSTGRES_PASSWORD: homeland_local
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - homeland_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeland -d homeland"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  homeland_postgres_data:
